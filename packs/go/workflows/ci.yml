name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '__GO_VERSION__'
          cache: true

      - name: Install pinned tools
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@v2.32.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.5
          go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: actionlint
        run: actionlint

      - name: gosec
        run: gosec ./...

      - name: govulncheck
        run: govulncheck ./...

      - name: go test -race
        run: go test -race ./...

      - name: Mutation testing (__PROTECTED_PATH__ only)
        run: gremlins unleash ./__PROTECTED_PATH__/... --dry-run
        continue-on-error: true

      - name: citation-lint
        run: ./scripts/citation-lint.sh

      - name: wiki-lint
        run: ./scripts/hooks/wiki-lint.sh

      - name: ginkgo-only-check
        run: ./scripts/hooks/ginkgo-only-check.sh


      - name: shared-script-enforcement
        run: ./scripts/hooks/shared-script-enforcement.sh

      - name: hook-existence-check
        run: ./scripts/hooks/hook-existence-check.sh

      - name: diff-aware-check
        run: ./scripts/hooks/diff-aware-check.sh origin/${{ github.base_ref || 'main' }} HEAD

      - name: decision-log-gate
        if: github.event_name == 'pull_request'
        run: ./scripts/hooks/decision-log-gate.sh origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }}

      - name: pending-lessons-push-block
        run: ./scripts/hooks/pending-lessons-push-block.sh

      - name: commit-message-lint
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags origin "$BASE" 2>/dev/null || true
          for sha in $(git rev-list "$BASE..$HEAD_SHA"); do
            echo "--- $sha ---"
            ./scripts/hooks/commit-message-lint.sh "$sha"
          done

      - name: Claude config drift check
        run: |
          chmod +x scripts/sync-claude.sh
          make sync-claude
          if ! git diff --quiet .claude/ .mcp.json; then
            echo "DRIFT: Claude config does not match opencode.json sync output."
            echo "Run 'make sync-claude' locally and commit the changes."
            git diff --stat .claude/ .mcp.json
            exit 1
          fi

      - name: Codex config drift check
        run: |
          chmod +x scripts/sync-codex.sh
          make sync-codex
          if ! git diff --quiet .codex/; then
            echo "DRIFT: Codex config does not match canonical opencode role sources."
            echo "Run 'make sync-codex' locally and commit the changes."
            git diff --stat .codex/
            exit 1
          fi

      - name: Harness structural parity
        run: |
          ./scripts/harness-structural-eval.sh --harness=opencode
          ./scripts/harness-structural-eval.sh --harness=claude
          ./scripts/harness-structural-eval.sh --harness=codex

  golden-task-eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '__GO_VERSION__'

      - name: Golden-task evals
        run: ./scripts/golden-task-eval.sh --harness=opencode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
