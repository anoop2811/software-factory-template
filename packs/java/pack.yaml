# Java / Spring Boot language pack — maturity: experimental
# (the full stack and CI now ship, but no real repository has adopted this
# pack yet; the label changes to beta on first real adoption, per Decision 3
# and Decision 12.)
#
# Blessed stack — one per language (Decision 3), verified current 2026-07-17
# against each tool's release page (re-check before adoption; pinned so a
# compromised @latest can't enter the gate path):
#   Tests:         JUnit Jupiter + AssertJ + Mockito + Testcontainers 2.x
#   Format:        Spotless 8.8.0 + palantir-java-format 2.96.0 (auto-fix)
#   Correctness:   Error Prone 2.50.0 via net.ltgt.errorprone 5.1.0 (compile-time)
#   Bugs+security: SpotBugs 6.5.x + find-sec-bugs 1.14.0 (bytecode)
#   Dependencies:  OSV-Scanner (osv.dev) — the govulncheck analog
#   Mutation:      PIT via gradle-pitest-plugin 1.19.0 + pitest-junit5-plugin 1.2.2
# Gradle wrapper preferred; Maven wrapper supported.

pack_name: java
maturity: experimental
test_file_patterns: "(Test|Tests|IT|ITCase)\.java$"
check_command: "./gradlew spotlessCheck test && ./scripts/hooks/junit5-only-check.sh"

# Files installed by factory-init:
#   quality.gradle             -> repository root (apply from your build.gradle)
#   hooks/junit5-only-check.sh -> scripts/hooks/ (enforces the JUnit 5 dialect)
#   workflows/ci.yml           -> .github/workflows/java-pack.yml
#                                 (format, correctness, bugs, deps, test, mutation, gates)
java_min_version: "25"
