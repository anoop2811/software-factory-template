# TypeScript/JavaScript language pack — maturity: experimental
# (the full stack and CI now ship, but no real repository has adopted this
# pack yet; the label changes to beta on first real adoption, per Decision 3
# and Decision 13.)
#
# Blessed stack — one per language (Decision 3), verified current 2026-07-17
# against each tool's release page (re-check before adoption; pinned so a
# compromised @latest can't enter the gate path):
#   Format + lint: Biome 2.5.4 (one fast tool, replaces ESLint + Prettier)
#   Types:         tsc --noEmit (your project's TypeScript — the type ground truth)
#   Tests:         Vitest 4.1.10
#   Mutation:      Stryker 9.6.1 + @stryker-mutator/vitest-runner
#   Dependencies:  OSV-Scanner (osv.dev) — the govulncheck analog, shared with the Java pack
# Package manager: npm. Node.js 24 (Active LTS).
#
# Add these devDependencies so tsc and vitest resolve from node_modules (the
# type-check and tests run the project's own pinned versions, not a download):
#   vitest@4.1.10  typescript
# Biome and Stryker are pinned by CI at their npx call, so they are optional
# locally: @biomejs/biome@2.5.4, @stryker-mutator/core@9.6.1,
# @stryker-mutator/vitest-runner@9.6.1.

pack_name: typescript
maturity: experimental
test_file_patterns: "\.test\.[jt]sx?$ \.spec\.[jt]sx?$"
check_command: "npx @biomejs/biome@2.5.4 ci . && ./node_modules/.bin/tsc --noEmit && ./node_modules/.bin/vitest run && ./scripts/hooks/vitest-only-check.sh"

# Files installed by factory-init:
#   biome.json                  -> repository root (format + lint config)
#   stryker.config.json         -> repository root (mutation config, vitest runner)
#   hooks/vitest-only-check.sh  -> scripts/hooks/ (enforces the Vitest dialect)
#   workflows/ci.yml            -> .github/workflows/typescript-pack.yml
#                                  (format, types, tests, mutation, deps, gates)
node_min_version: "24"
